bundle:
  name: dab-demo

targets:
  dev:
    workspace:
      host: https://dbc-bbdbbd29-8924.cloud.databricks.com

resources:
  jobs:
    pipeline-job:
      name: multi-task-pipeline

      tasks:
        - task_key: load_task
          sql_task:
            file:
              path: ./src/load.sql
            warehouse_id: e19011546a1083a6

        - task_key: transform_task
          depends_on:
            - task_key: load_task
          sql_task:
            file:
              path: ./src/transform.sql
            warehouse_id: e19011546a1083a6

        - task_key: validate_task
          depends_on:
            - task_key: transform_task
          sql_task:
            file:
              path: ./src/validate.sql
            warehouse_id: e19011546a1083a6